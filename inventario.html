<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - Diamond Painting</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-3">
        <div class="container">
            <a class="navbar-brand" href="index.html">Diamond Studio</a>
            <div class="navbar-nav ms-auto flex-row gap-3">
                <a class="nav-link" href="index.html">Lienzo</a>
                <a class="nav-link active" href="inventario.html">Stock</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row g-3">
            <div class="col-md-4">
                <div class="card shadow-sm mb-3">
                    <div class="card-header bg-primary text-white py-2">
                        <h6 class="mb-0">Añadir Diamante</h6>
                    </div>
                    <div class="card-body p-3">
                        <form id="form-diamante">
                            <div class="mb-2">
                                <label class="small fw-bold">Referencia</label>
                                <input type="text" id="nombre" class="form-control form-control-sm" placeholder="Ej: Bolsa 01">
                            </div>
                            <div class="row g-2 mb-3">
                                <div class="col-6">
                                    <label class="small fw-bold">Color</label>
                                    <input type="color" id="colorHex" class="form-control form-control-color form-control-sm w-100" value="#ff0000">
                                </div>
                                <div class="col-6">
                                    <label class="small fw-bold">Cantidad</label>
                                    <input type="number" id="cantidad" class="form-control form-control-sm" placeholder="∞">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary btn-sm w-100 fw-bold">＋ GUARDAR</button>
                        </form>
                    </div>
                </div>

                <div class="row g-2 mb-4">
                    <div class="col-6">
                        <button onclick="exportarJSON()" class="btn btn-outline-secondary btn-sm w-100">📤 Exportar</button>
                    </div>
                    <div class="col-6">
                        <button onclick="document.getElementById('importFile').click()" class="btn btn-outline-secondary btn-sm w-100">📥 Importar</button>
                    </div>
                    <input type="file" id="importFile" style="display:none" accept=".json" onchange="importarJSON(this)">
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-dark small">
                                <tr>
                                    <th style="width: 40px;">Color</th>
                                    <th>Ref.</th>
                                    <th style="width: 100px;">Cant.</th>
                                    <th style="width: 40px;"></th>
                                </tr>
                            </thead>
                            <tbody id="tabla-cuerpo" class="small"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/inventario.js"></script>
</body>
</html>
